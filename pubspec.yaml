# pubspec.yaml (project root)

name: ink_scratch
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Networking
  dio: ^5.9.1

  # Local storage
  # ✅ Switched from hive to hive_ce — community fork that supports Dart 3.x
  # hive_ce is a drop-in replacement: same API, same @HiveType/@HiveField annotations
  hive_ce: ^2.10.1
  hive_ce_flutter: ^2.2.0
  path_provider: ^2.1.5

  # Utilities
  crypto: ^3.0.7
  dartz: ^0.10.1
  logger: ^2.6.2
  image_picker: ^1.2.1

  # Testing (runtime)
  mockito: ^5.4.4
  mocktail: ^1.0.4

  flutter_test:
    sdk: flutter
  local_auth: ^3.0.1
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  # ✅ hive_ce_generator replaces hive_generator — fully compatible with Dart 3.11
  hive_ce_generator: ^1.11.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/content.png
    - assets/icons/miku.jpg